info:
  name: ars-mor
  type: graphql
  seq: 5

graphql:
  method: POST
  url: https://api.entur.io/journey-planner/v3/graphql
  headers:
    - name: ET-Client-Name
      value: dev.fjorden.nu
  body:
    query: |-
      {
        trip(
          from: {place: "NSR:Quay:99704", name: "Arsvågen kai, Bokn"}
          to: {place: "NSR:Quay:99269", name: "Mortavika ferjekai"}
          numTripPatterns: 10
          modes: {transportModes: {transportMode: water}}
          searchWindow: 1440
        ) {
          tripPatterns {
            startTime
            duration
            walkDistance
            legs {
              mode
              distance
              line {
                id
                publicCode
                authority {
                  name
                }
                situations {
                  summary {
                    language
                    value
                  }
                  description {
                    language
                    value
                  }
                }
              }
              fromEstimatedCall {
                quay {
                  id
                  name
                }
                realtime
                aimedDepartureTime
                expectedDepartureTime
                actualDepartureTime
              }
              toEstimatedCall {
                quay {
                  id
                  name
                }
                aimedDepartureTime
                expectedDepartureTime
                actualDepartureTime
              }
              intermediateEstimatedCalls {
                aimedArrivalTime
                expectedArrivalTime
                actualArrivalTime
                aimedDepartureTime
                expectedDepartureTime
                actualDepartureTime
                quay {
                  id
                  name
                }
              }
            }
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
