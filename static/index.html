<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferje – Arsvågen ↔ Mortavika</title>
  <link rel="icon" href="/favicon.svg" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="https://unpkg.com/@entur/tokens/dist/styles.css" />
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script>
    (function () {
      var script = document.createElement('script');
      script.defer = true;
      // Use external hosted script for localhost/dev to avoid 404s on /_vercel/insights/script.js
      var host = window.location && window.location.hostname;
      if (host === 'localhost' || host === '127.0.0.1') {
        script.src = 'https://va.vercel-scripts.com/v1/script.debug.js';
      } else {
        script.src = '/_vercel/insights/script.js';
      }
      document.head.appendChild(script);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Semantic tokens – light mode ── */
    :root {
      --app-bg:              var(--colors-blue-90,  #f5f5f8);
      --app-surface:         var(--colors-brand-white, #ffffff);
      --app-surface-header:  var(--colors-blue-90,  #f5f5f8);
      --app-border:          var(--colors-grey-70,  #e9e9e9);
      --app-text:            var(--colors-grey-10,  #2a2a2a);
      --app-muted:           var(--colors-grey-50,  #949494);
      --app-heading:         var(--colors-brand-blue, #181c56);
      --app-shadow:          rgba(24, 28, 86, 0.06);
      --app-ferry:           var(--colors-transport-ferry-default, #0c6693);
      --app-next-bg:         #e8f4f9;
      --app-hover-bg:        var(--colors-blue-90,  #f5f5f8);

      --app-badge-success-bg:    var(--colors-mint-tint,   #d0f1e3);
      --app-badge-success-color: #0d6641;
      --app-badge-success-dot:   var(--colors-mint-default, #1a8e60);
      --app-badge-warning-bg:    var(--colors-canary-tint,  #fff4cd);
      --app-badge-warning-color: #7a5000;
      --app-badge-info-bg:       var(--colors-sky-tint,     #e1eff8);
      --app-badge-info-color:    var(--colors-transport-ferry-default, #0c6693);
      --app-badge-danger-bg:     var(--colors-lava-tint,    #ffcece);
      --app-badge-danger-color:  var(--colors-lava-default, #d31b1b);
    }

    /* ── Semantic tokens – dark mode ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --app-bg:              var(--colors-brand-blue, #181c56);
        --app-surface:         var(--colors-blue-10,  #292b6a);
        --app-surface-header:  rgba(0, 0, 0, 0.2);
        --app-border:          var(--colors-blue-30,  #54568c);
        --app-text:            var(--colors-brand-white, #ffffff);
        --app-muted:           var(--colors-blue-60,  #babbcf);
        --app-heading:         var(--colors-brand-white, #ffffff);
        --app-shadow:          rgba(0, 0, 0, 0.3);
        --app-ferry:           var(--colors-transport-ferry-contrast, #6fdfff);
        --app-next-bg:         rgba(111, 223, 255, 0.08);
        --app-hover-bg:        rgba(255, 255, 255, 0.04);

        --app-badge-success-bg:    rgba(26, 142, 96, 0.2);
        --app-badge-success-color: var(--colors-mint-contrast,   #5ac39a);
        --app-badge-success-dot:   var(--colors-mint-contrast,   #5ac39a);
        --app-badge-warning-bg:    rgba(255, 202, 40, 0.15);
        --app-badge-warning-color: var(--colors-canary-contrast, #ffe082);
        --app-badge-info-bg:       rgba(0, 130, 185, 0.2);
        --app-badge-info-color:    var(--colors-transport-ferry-contrast, #6fdfff);
        --app-badge-danger-bg:     rgba(211, 27, 27, 0.2);
        --app-badge-danger-color:  var(--colors-lava-contrast,   #ff9494);
      }
    }

    body {
      background: var(--app-bg);
      color: var(--app-text);
      font-family: "Nationale", Arial, "Segoe UI", Roboto, Helvetica Neue, sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.5;
      min-height: 100vh;
      padding: 32px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--app-ferry);
      margin-bottom: 8px;
    }

    .header-eyebrow svg {
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--app-heading);
      letter-spacing: -0.01em;
    }

    header p {
      color: var(--app-muted);
      font-size: 0.875rem;
      margin-top: 6px;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      .board { grid-template-columns: 1fr; }
    }

    .column {
      background: var(--app-surface);
      border: 1px solid var(--app-border);
      border-radius: var(--border-radiuses-large, 0.5rem);
      overflow: hidden;
      box-shadow: 0 1px 3px var(--app-shadow);
    }

    .column-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--app-border);
      background: var(--app-surface-header);
    }

    .column-header .route {
      font-size: 1rem;
      font-weight: 600;
      color: var(--app-heading);
    }

    .column-header .route-sub {
      font-size: 0.8125rem;
      color: var(--app-muted);
      margin-top: 2px;
    }

    .departure-list {
      list-style: none;
    }

    .departure-item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--app-border);
      transition: background var(--timing-fast, 0.1s);
    }

    .departure-item:last-child { border-bottom: none; }

    .departure-item.next {
      background: var(--app-next-bg);
      border-left: 3px solid var(--app-ferry);
      padding-left: 17px;
    }

    .departure-item:not(.next):hover {
      background: var(--app-hover-bg);
    }

    .dep-time {
      font-size: 1.125rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--app-text);
      line-height: 1;
    }

    .departure-item.next .dep-time {
      color: var(--app-ferry);
      font-size: 1.375rem;
    }

    .dep-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dep-line {
      font-size: 0.8125rem;
      color: var(--app-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dep-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Entur badge style — eds-badge */
    .eds-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--border-radiuses-medium, 0.25rem);
      line-height: 1.4;
      white-space: nowrap;
    }

    .eds-badge .eds-badge__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .eds-badge--success {
      background: var(--app-badge-success-bg);
      color: var(--app-badge-success-color);
    }
    .eds-badge--success .eds-badge__dot {
      background: var(--app-badge-success-dot);
    }

    .eds-badge--warning {
      background: var(--app-badge-warning-bg);
      color: var(--app-badge-warning-color);
    }

    .eds-badge--info {
      background: var(--app-badge-info-bg);
      color: var(--app-badge-info-color);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .eds-badge--danger {
      background: var(--app-badge-danger-bg);
      color: var(--app-badge-danger-color);
    }

    .dep-duration {
      font-size: 0.8125rem;
      color: var(--app-muted);
      text-align: right;
      white-space: nowrap;
    }

    .dep-duration span {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: var(--app-text);
    }

    .status-box {
      padding: 36px 20px;
      text-align: center;
      color: var(--app-muted);
      font-size: 0.875rem;
    }

    .status-box.error {
      color: var(--app-badge-danger-color);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--app-border);
      border-top-color: var(--app-ferry);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .refresh-bar {
      height: 3px;
      background: var(--app-border);
      overflow: hidden;
    }

    .refresh-progress {
      height: 100%;
      background: var(--app-ferry);
      width: 100%;
      transform-origin: left;
      animation: countdown 60s linear forwards;
    }

    @keyframes countdown {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-eyebrow">
    <!-- Ferry icon from Entur icon set -->
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20 18H4l-2 3h20l-2-3ZM4 18l2-7h12l2 7M8 11V7h8v4M10 7V4h4v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Ferjeruter
  </div>
  <h1>Arsvågen ↔ Mortavika</h1>
  <p id="last-updated">Laster…</p>
</header>

<div class="board">
  <div class="column" id="col-ars-mor">
    <div class="column-header">
      <div class="route">Arsvågen → Mortavika</div>
      <div class="route-sub" id="sub-ars-mor"></div>
    </div>
    <ul class="departure-list" id="list-ars-mor">
      <li class="status-box"><div class="spinner"></div><br>Henter avganger…</li>
    </ul>
    <div class="refresh-bar"><div class="refresh-progress" id="progress-ars-mor"></div></div>
  </div>

  <div class="column" id="col-mor-ars">
    <div class="column-header">
      <div class="route">Mortavika → Arsvågen</div>
      <div class="route-sub" id="sub-mor-ars"></div>
    </div>
    <ul class="departure-list" id="list-mor-ars">
      <li class="status-box"><div class="spinner"></div><br>Henter avganger…</li>
    </ul>
    <div class="refresh-bar"><div class="refresh-progress" id="progress-mor-ars"></div></div>
  </div>
</div>

<script>
  const ROUTES = [
    { id: 'ars-mor', endpoint: '/api/departures/ars-mor' },
    { id: 'mor-ars', endpoint: '/api/departures/mor-ars' },
  ];

  function formatTime(isoString) {
    const d = new Date(isoString);
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${hh}:${mm}`;
  }

  function formatDuration(seconds) {
    return Math.round(seconds / 60);
  }

  function renderDepartures(routeId, data) {
    const list = document.getElementById(`list-${routeId}`);
    const sub  = document.getElementById(`sub-${routeId}`);

    if (data.from_name && data.to_name) {
      sub.textContent = `${data.from_name} → ${data.to_name}`;
    }

    if (!data.departures || data.departures.length === 0) {
      list.innerHTML = '<li class="status-box">Ingen avganger funnet.</li>';
      return;
    }

    list.innerHTML = data.departures.map((dep, i) => {
      const isNext   = i === 0;
      const expTime  = formatTime(dep.expectedDepartureTime);
      const aimTime  = formatTime(dep.aimedDepartureTime);
      const duration = formatDuration(dep.duration);
      const delayed  = expTime !== aimTime;

      const rtBadge = dep.realtime
        ? `<span class="eds-badge eds-badge--success"><span class="eds-badge__dot"></span>Sanntid</span>`
        : `<span class="eds-badge eds-badge--warning">Planlagt ${aimTime}</span>`;

      const nextBadge = isNext ? `<span class="eds-badge eds-badge--info">Neste</span>` : '';
      const delayedBadge = delayed ? `<span class="eds-badge eds-badge--danger">Forsinket</span>` : '';

      return `
        <li class="departure-item ${isNext ? 'next' : ''}">
          <div class="dep-time">${expTime}</div>
          <div class="dep-meta">
            <div class="dep-badges">${nextBadge}${rtBadge}${delayedBadge}</div>
            <div class="dep-line">${dep.line}${dep.publicCode ? ' · ' + dep.publicCode : ''}</div>
          </div>
          <div class="dep-duration">
            <span>${duration} min</span>
            varighet
          </div>
        </li>`;
    }).join('');
  }

  function renderError(routeId, message) {
    const list = document.getElementById(`list-${routeId}`);
    list.innerHTML = `<li class="status-box error">Kunne ikke hente avganger.<br><small>${message}</small></li>`;
  }

  function restartProgress(routeId) {
    const el = document.getElementById(`progress-${routeId}`);
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'countdown 60s linear forwards';
  }

  async function fetchRoute(routeId, endpoint) {
    try {
      const res = await fetch(endpoint);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderDepartures(routeId, data);
    } catch (err) {
      renderError(routeId, err.message);
    }
    restartProgress(routeId);
  }

  function updateTimestamp() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('last-updated').textContent =
      `Sist oppdatert: ${hh}:${mm}:${ss}`;
  }

  function fetchAll() {
    ROUTES.forEach(r => fetchRoute(r.id, r.endpoint));
    updateTimestamp();
  }

  fetchAll();
  setInterval(fetchAll, 60_000);
</script>

<footer style="text-align:center; margin-top:40px; font-size:0.8125rem; color:var(--app-muted);">

</footer>

</body>
</html>
