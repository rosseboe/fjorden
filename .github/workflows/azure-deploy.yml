name: Deploy fjorden to Azure App Service

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --no-dev --frozen

      # Optional: run tests here
      # - name: Run tests
      #   run: pytest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "<YOUR_AZURE_APP_NAME>"
          package: "."
          startup-command: >
            gunicorn -w 2 -k uvicorn.workers.UvicornWorker 
            -b 0.0.0.0:8000 fjorden.main:app
